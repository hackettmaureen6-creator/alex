document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>For Dad<\u002Ftitle>\n<link rel=\"icon\" type=\"image/png\" href=\"f093bb2a-c8f0-420b-b20b-96885009f80d\">\n<link rel=\"apple-touch-icon\" href=\"f093bb2a-c8f0-420b-b20b-96885009f80d\">\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<style>/* latin-ext */\n@font-face {\n  font-family: 'Parisienne';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"a85ef6ee-19ba-4713-8e39-d18b13f934e6\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Parisienne';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"69143e53-42f3-4b75-be54-eaa0fd0f1bfe\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Pinyon Script';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"4736a883-9e96-4083-a3b1-4327cf5fcc76\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Pinyon Script';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"01870018-9563-492f-a068-4b6692f0379c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Pinyon Script';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"9b55dafd-f7b9-4976-9418-e1cee5b0d707\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n  :root {\n    --celeste: #74acdf;   /* Argentine flag blue */\n    --celeste-2: #6aa3d6;\n    --sun: #f6b40e;       /* Sol de Mayo gold */\n    --ink: #111111;       /* black */\n    --paper: #f6efe0;\n    --paper-2: #efe6d2;\n    --paper-3: #e7dcc2;\n  }\n  * { box-sizing: border-box; }\n  html, body {\n    margin: 0;\n    height: 100%;\n    background: var(--celeste);\n  }\n  body {\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  .scene {\n    position: relative;\n    width: 440px;\n    height: 520px;\n    perspective: 1400px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n  }\n\n  /* ---------------- Envelope ---------------- */\n  .mail {\n    position: absolute;\n    width: 360px;\n    height: 232px;\n    z-index: 5;\n    cursor: pointer;\n    transition: opacity .6s ease .1s, transform .85s cubic-bezier(.4,0,.2,1) .1s;\n    filter: drop-shadow(0 22px 30px rgba(20,40,70,.28));\n  }\n  .mail .back {\n    position: absolute; inset: 0;\n    background: var(--paper-2);\n    border-radius: 9px;\n  }\n  .mail .front {\n    position: absolute; inset: 0;\n    background:\n      linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);\n    border-radius: 9px;\n    clip-path: polygon(0 0, 50% 50%, 100% 0, 100% 100%, 0 100%);\n  }\n  /* faint pocket fold lines */\n  .mail .front::after {\n    content: \"\";\n    position: absolute; inset: 0;\n    background:\n      linear-gradient(to top right, transparent 49.6%, rgba(120,100,60,.16) 50%, transparent 50.4%) no-repeat,\n      linear-gradient(to top left,  transparent 49.6%, rgba(120,100,60,.16) 50%, transparent 50.4%) no-repeat;\n    background-size: 50% 100%, 50% 100%;\n    background-position: left bottom, right bottom;\n  }\n  .mail .flap {\n    position: absolute;\n    top: 0; left: 0;\n    width: 0; height: 0;\n    border-left: 180px solid transparent;\n    border-right: 180px solid transparent;\n    border-top: 116px solid var(--paper-3);\n    transform-origin: top center;\n    transform: rotateX(0deg);\n    transition: transform .75s cubic-bezier(.6,0,.25,1);\n    z-index: 8;\n    filter: drop-shadow(0 2px 1px rgba(120,100,60,.18));\n  }\n  .scene.opening .flap,\n  .scene.open .flap {\n    transform: rotateX(178deg);\n    z-index: 1;\n    transition: transform .75s cubic-bezier(.6,0,.25,1), z-index 0s linear .38s;\n  }\n  .scene.open .mail {\n    opacity: 0;\n    transform: translateY(34px) scale(.97);\n    pointer-events: none;\n  }\n\n  /* ---------------- Revealed content ---------------- */\n  .content {\n    position: absolute;\n    width: 380px;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    z-index: 1;\n    opacity: 0;\n    transform: translateY(28px) scale(.34);\n    transform-origin: 50% 72%;\n    transition: opacity .6s ease, transform .95s cubic-bezier(.2,.75,.2,1);\n  }\n  .scene.open .content {\n    opacity: 1;\n    transform: translateY(-4px) scale(1);\n    z-index: 20;\n  }\n\n  .loader {\n    position: relative;\n    width: 200px;\n    height: 200px;\n  }\n  .loader canvas {\n    position: absolute;\n    inset: 0;\n    width: 200px;\n    height: 200px;\n  }\n\n  .header {\n    font-family: 'Parisienne', cursive;\n    color: var(--ink);\n    font-size: 40px;\n    font-weight: 400;\n    margin-bottom: 14px;\n    letter-spacing: .5px;\n    text-shadow: 0 1px 0 rgba(17,17,17,.18);\n    opacity: 0;\n    transform: translateY(10px);\n    transition: opacity .7s ease .15s, transform .7s ease .15s;\n  }\n  .scene.open .header { opacity: 1; transform: translateY(0); }\n\n  .message {\n    margin-top: 22px;\n    text-align: center;\n    font-family: 'Parisienne', cursive;\n    color: var(--ink);\n    font-size: 31px;\n    line-height: 1.35;\n    width: 360px;\n    text-wrap: balance;\n  }\n  .message .line {\n    display: block;\n    -webkit-mask-image: linear-gradient(90deg, #000 0 38%, rgba(0,0,0,0) 62% 100%);\n    mask-image: linear-gradient(90deg, #000 0 38%, rgba(0,0,0,0) 62% 100%);\n    -webkit-mask-size: 260% 100%;\n    mask-size: 260% 100%;\n    -webkit-mask-position: 100% 0;\n    mask-position: 100% 0;\n    transition: -webkit-mask-position 1.7s ease, mask-position 1.7s ease;\n  }\n  .message .sig {\n    margin-top: 10px;\n    font-family: 'Pinyon Script', cursive;\n    font-size: 27px;\n    letter-spacing: .5px;\n  }\n  .scene.open .message .line { -webkit-mask-position: 0 0; mask-position: 0 0; }\n  .scene.open .message .l1 { transition-delay: .25s; }\n  .scene.open .message .l2 { transition-delay: 1.05s; }\n  .scene.open .message .sig { transition-delay: 1.95s; }\n\n  /* ---------------- Address sticker ---------------- */\n  .sticker {\n    position: absolute;\n    left: 50%;\n    top: 132px;\n    transform: translateX(-50%) rotate(-1.4deg);\n    width: 184px;\n    z-index: 9;\n    cursor: pointer;\n    perspective: 700px;\n  }\n  .sticker-inner {\n    position: relative;\n    width: 100%;\n    border-radius: 12px;\n    padding: 12px 16px;\n    background: linear-gradient(160deg, var(--sun) 0%, #eaa400 100%);\n    box-shadow: 0 4px 10px rgba(120,90,10,.32), inset 0 1px 0 rgba(255,255,255,.4);\n    transform-origin: 50% 0%;\n    transition: transform .6s cubic-bezier(.6,0,.25,1), opacity .5s ease .25s;\n    backface-visibility: hidden;\n  }\n  .sticker-inner::before {\n    content: \"\";\n    position: absolute;\n    left: 50%; top: -7px;\n    width: 14px; height: 14px;\n    border-radius: 50%;\n    transform: translateX(-50%);\n    background: radial-gradient(circle at 35% 30%, #fff7e0, #d99500);\n    box-shadow: 0 1px 2px rgba(120,90,10,.4);\n  }\n  .sticker .to, .sticker .frm {\n    font-family: 'Parisienne', cursive;\n    color: var(--ink);\n    line-height: 1.15;\n  }\n  .sticker .lbl {\n    font-family: 'Pinyon Script', cursive;\n    font-size: 13px;\n    opacity: .7;\n    margin-right: 4px;\n  }\n  .sticker .to { font-size: 22px; }\n  .sticker .frm { font-size: 18px; margin-top: 4px; }\n  .sticker .rule {\n    height: 1px;\n    background: rgba(17,17,17,.22);\n    margin: 7px 0;\n  }\n  .scene.opening .sticker-inner,\n  .scene.open .sticker-inner {\n    transform: rotateX(176deg);\n    opacity: 0;\n  }\n\n  /* ---------------- Hint ---------------- */\n  .hint {\n    position: absolute;\n    bottom: 40px;\n    font-family: 'Pinyon Script', cursive;\n    font-size: 22px;\n    color: rgba(17,17,17,.62);\n    letter-spacing: .4px;\n    animation: breathe 2.6s ease-in-out infinite;\n    pointer-events: none;\n    transition: opacity .45s ease;\n  }\n  .scene.opening .hint,\n  .scene.open .hint { opacity: 0; animation: none; visibility: hidden; }\n  @keyframes breathe {\n    0%, 100% { opacity: .42; transform: translateY(0); }\n    50%      { opacity: .85; transform: translateY(-2px); }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"scene sealed\" id=\"scene\">\n    <div class=\"content\">\n      <div class=\"header\">Dear Argentina,<\u002Fdiv>\n      <div class=\"loader\">\n        <canvas id=\"whirl\" width=\"200\" height=\"200\"><\u002Fcanvas>\n        <canvas id=\"globe\" width=\"200\" height=\"200\"><\u002Fcanvas>\n      <\u002Fdiv>\n      <div class=\"message\">\n        <span class=\"line l1\">Happy Father’s Day to the<\u002Fspan>\n        <span class=\"line l2\">World Cup of men and dads alike.<\u002Fspan>\n        <span class=\"line sig\">Love, France<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mail\" id=\"mail\">\n      <div class=\"back\"><\u002Fdiv>\n      <div class=\"front\"><\u002Fdiv>\n      <div class=\"flap\"><\u002Fdiv>\n      <div class=\"sticker\" id=\"sticker\">\n        <div class=\"sticker-inner\">\n          <div class=\"to\"><span class=\"lbl\">To<\u002Fspan>Alex<\u002Fdiv>\n          <div class=\"rule\"><\u002Fdiv>\n          <div class=\"frm\"><span class=\"lbl\">From<\u002Fspan>Mosie<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"hint\">tap to open<\u002Fdiv>\n  <\u002Fdiv>\n\n  \n\n  <script src=\"7790fcc5-1269-4417-8887-23875791cd1c\"><\u002Fscript>\n  <script src=\"55cdb7e3-69d1-4a8c-8e1c-0ae3e9a5e528\"><\u002Fscript>\n  <script>\n  (function () {\n    const SUN = '#f6b40e';\n    const SIZE = 200;\n    const DPR = Math.min(window.devicePixelRatio || 1, 2);\n\n    function setup(canvas) {\n      canvas.width = SIZE * DPR;\n      canvas.height = SIZE * DPR;\n      const ctx = canvas.getContext('2d');\n      ctx.scale(DPR, DPR);\n      return ctx;\n    }\n\n    const gctx = setup(document.getElementById('globe'));\n    const wctx = setup(document.getElementById('whirl'));\n\n    const cx = SIZE / 2, cy = SIZE / 2, R = 62;\n\n    const projection = d3.geoOrthographic()\n      .scale(R).translate([cx, cy]).clipAngle(90);\n    const path = d3.geoPath(projection, gctx);\n    const graticule = d3.geoGraticule10();\n\n    let land = null, borders = null;\n    const ATLAS_URL = (window.__resources && window.__resources.worldAtlas) || 'https://unpkg.com/world-atlas@2.0.2/countries-110m.json';\n    d3.json(ATLAS_URL)\n      .then(world => {\n        land = topojson.merge(world, world.objects.countries.geometries);\n        borders = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);\n      })\n      .catch(() => {});\n\n    function drawGlobe(rot) {\n      projection.rotate([rot, -16, 0]);\n      gctx.clearRect(0, 0, SIZE, SIZE);\n\n      // ocean — white\n      gctx.beginPath();\n      path({ type: 'Sphere' });\n      gctx.fillStyle = '#ffffff';\n      gctx.fill();\n\n      // faint graticule for roundness\n      gctx.beginPath();\n      path(graticule);\n      gctx.strokeStyle = 'rgba(17,17,17,0.08)';\n      gctx.lineWidth = 0.5;\n      gctx.stroke();\n\n      // land — black\n      if (land) {\n        gctx.beginPath();\n        path(land);\n        gctx.fillStyle = '#111111';\n        gctx.fill();\n      }\n      // seams between countries\n      if (borders) {\n        gctx.beginPath();\n        path(borders);\n        gctx.strokeStyle = 'rgba(255,255,255,0.16)';\n        gctx.lineWidth = 0.5;\n        gctx.stroke();\n      }\n\n      // rim / spine — gold sun\n      gctx.beginPath();\n      gctx.arc(cx, cy, R, 0, Math.PI * 2);\n      gctx.strokeStyle = SUN;\n      gctx.lineWidth = 1.6;\n      gctx.stroke();\n    }\n\n    function drawWhirl(t) {\n      wctx.clearRect(0, 0, SIZE, SIZE);\n      const rings = [\n        { r: R + 12, speed: 1.0,   span: 1.5, w: 2.3 },\n        { r: R + 20, speed: -0.6,  span: 1.1, w: 1.7 },\n        { r: R + 28, speed: 0.42,  span: 0.8, w: 1.1 }\n      ];\n      rings.forEach(ring => {\n        const head = t * ring.speed;\n        const steps = 40;\n        for (let i = 0; i < steps; i++) {\n          const f = i / steps;\n          const a0 = head - f * ring.span;\n          const a1 = head - (f + 1 / steps) * ring.span;\n          wctx.beginPath();\n          wctx.arc(cx, cy, ring.r, a0, a1, true);\n          wctx.strokeStyle = `rgba(246,180,14,${(1 - f) * 0.55})`;\n          wctx.lineWidth = ring.w * (1 - f * 0.5);\n          wctx.lineCap = 'round';\n          wctx.stroke();\n        }\n        const hx = cx + Math.cos(head) * ring.r;\n        const hy = cy + Math.sin(head) * ring.r;\n        wctx.beginPath();\n        wctx.arc(hx, hy, ring.w * 0.9, 0, Math.PI * 2);\n        wctx.fillStyle = SUN;\n        wctx.fill();\n      });\n    }\n\n    let rot = 0, last = performance.now();\n    function frame(now) {\n      const dt = Math.min((now - last) / 1000, 0.05);\n      last = now;\n      rot += dt * 18;\n      const t = now / 1000;\n      drawGlobe(rot);\n      drawWhirl(t * 1.5);\n      requestAnimationFrame(frame);\n    }\n    requestAnimationFrame(frame);\n\n    // ---- envelope open journey ----\n    const scene = document.getElementById('scene');\n    const mail = document.getElementById('mail');\n    function open() {\n      if (!scene.classList.contains('sealed')) return;\n      scene.classList.remove('sealed');\n      scene.classList.add('opening');\n      setTimeout(() => scene.classList.add('open'), 520);\n    }\n    mail.addEventListener('click', open);\n  })();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
